<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Órbita</title>

    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/pages/account.css">

    <script type="module" src="../scripts/main.js"></script>
    <script type="module" src="../scripts/pages/account.js"></script>
</head>
<body>
    <header>
        <orbi-nav></orbi-nav>
    </header>

    <orbi-panel></orbi-panel>

    <main>
        <nav id="account-sidebar">
            <ul>
                <li><a href="#" data-view="profile" class="active">Perfil</a></li>
                <li><a href="#" data-view="accounts">Cuentas</a></li>
                <li><a href="#" data-view="libraries">Librerías</a></li>
            </ul>
        </nav>

        <section id="account-content">
<div id="profile-view" class="content-view">
  <div class="account-header">
    <div class="image-wrapper">
      <img id="image" alt="Imagen de perfil">
      <button class="edit-field-btn image-btn" data-field="image" title="Cambiar foto">
        <orbi-icon name="image"></orbi-icon>
      </button>
    </div>

    <div class="account-header-info">
      <h2>
        <span id="username"></span>
        <button class="edit-field-btn" data-field="username" title="Editar usuario">
          <orbi-icon name="edit"></orbi-icon>
        </button>
      </h2>

      <p>
        <span id="email"></span>
      </p>
    </div>
  </div>

  <div class="account-details">
    <div>
      <h4>Suscripción</h4>
      <span id="tier"></span>
    </div>

    <div>
      <button id="change-password-btn" data-field="password" class="password-btn">
        <span>Cambiar Contraseña</span>
      </button>
    </div>
  </div>
</div>

<div id="accounts-view" class="content-view hidden">
    <h2>Cuentas</h2>
    <p>Sincronizá tus cuentas de plataformas para importar tus bibliotecas de juegos.</p>

    <ul class="sync-list">
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/steam.png" alt="Steam"><span>Steam</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/epicgames.png" alt="Epic Games"><span>Epic Games</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/gogcom.png" alt="GOG.COM"><span>GOG.COM</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/xbox.png"" alt="Xbox"><span>Xbox</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/eaapp.png" alt="EA App"><span>EA App</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/battlenet.png" alt="EA App"><span>Battle Net</span></a></li>
    <li class="sync-item"><a href="#" class="sync-link"><img src="/assets/images/platforms/ubisoft.png" alt="EA App"><span>Ubisoft Connect</span></a></li>
    </ul>
</div>

<div id="libraries-view" class="content-view hidden"></div>

<!-- Dialogo reutilizable -->
<dialog id="edit-dialog" aria-modal="true">
  <form id="edit-form" method="dialog">
    <h3 id="dialog-title"></h3>
    <div id="dialog-body"></div>
    <menu>
      <button id="dialog-cancel" type="button">Cancelar</button>
      <button id="dialog-save" type="submit">Guardar</button>
    </menu>
  </form>
</dialog>

    </main>
</body>
</html>
